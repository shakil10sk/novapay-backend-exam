name: NovaPay CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'novapay-backend/package-lock.json'
        
    - name: Install dependencies
      working-directory: novapay-backend
      run: npm ci
      
    - name: Run Lint
      working-directory: novapay-backend
      run: npm run lint
      
    - name: Run Tests
      working-directory: novapay-backend
      run: npm test
      
    - name: Get Version
      id: get_version
      working-directory: novapay-backend
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Build Docker Image
      run: |
        docker build -t novapay-api:${{ steps.get_version.outputs.VERSION }} novapay-backend/
        
    - name: Tag as Latest
      run: |
        docker tag novapay-api:${{ steps.get_version.outputs.VERSION }} novapay-api:latest
